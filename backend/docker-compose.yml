name: clocksy

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clocksy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clocksy}
      POSTGRES_DB: ${POSTGRES_DB:-clocksy}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clocksy} -d ${POSTGRES_DB:-clocksy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clocksy

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-clocksy}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-clocksy-secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clocksy

  # One-shot: creates the private bucket used for screenshot storage, then exits.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-clocksy} ${MINIO_ROOT_PASSWORD:-clocksy-secret};
      mc mb --ignore-existing local/${S3_BUCKET:-time-tracker};
      mc anonymous set none local/${S3_BUCKET:-time-tracker};
      exit 0;
      "
    networks:
      - clocksy

volumes:
  pgdata:
  miniodata:

networks:
  clocksy:
    driver: bridge
